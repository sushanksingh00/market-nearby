services:
  - type: web
    name: market-nearby
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn market_nearby.wsgi:application"
    healthCheckUrl: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
